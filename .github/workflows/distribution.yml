name: distribution

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: linux-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            deb_arch: amd64
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            deb_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install arm64 linker
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Run tests
        if: matrix.arch == 'amd64'
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Build linux tar.gz
        run: |
          VERSION=""
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          bash distribution/linux/package-tar.sh "${VERSION}" "${{ matrix.target }}" "dist"

      - name: Build linux deb
        run: |
          VERSION=""
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          bash distribution/linux/package-deb.sh "${VERSION}" "${{ matrix.target }}" "dist" "${{ matrix.deb_arch }}"

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdwatch-linux-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  windows:
    name: windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build windows zip
        shell: pwsh
        run: |
          $version = ""
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          ./distribution/windows/package-zip.ps1 -Version $version -Target "${{ matrix.target }}" -OutDir "dist"

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdwatch-windows-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/**/*.zip
